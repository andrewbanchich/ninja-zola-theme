name = "Ninja"
description = "A minimalist theme based on joshuarli's https://jrl.ninja/."
license = "CC0"
homepage = "https://gitlab.com/andrewbanchich/ninja-zola-theme"
min_version = "0.4.0"
demo = "https://andrewbanchich.gitlab.io/ninja-zola-theme/"

# Any variable there can be overriden in the end user `config.toml`
# You don't need to prefix variables by the theme name but as this will
# be merged with user data, some kind of prefix or nesting is preferable
# Use snake_casing to be consistent with the rest of Zola
[extra]

[author]
name = "Andrew Banchich"
homepage = "https://andrewbanchi.ch"

# If this is porting a theme from another static site engine, provide
# the info of the original author here
[original]
author =  "joshuarli"
homepage = "https://jrl.ninja/"
repo = "https://github.com/joshuarli/jrl.ninja-static"